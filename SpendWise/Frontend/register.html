<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

</head>

<body class="register-bg">

<div class="form-box text-center">

    <h2>Register</h2>
    <img src="images/logo.png" width="70" height="80">

    <form onsubmit="return registerUser()">

        <input id="username" class="form-control mb-3" placeholder="Username" required>
        <input id="email" class="form-control mb-3" placeholder="Email" required>
        <input id="password" type="password" class="form-control mb-3" placeholder="Password" required>

        <button class="btn btn-primary w-100">Register</button>

    </form>

    <a href="login.html">Back</a>

</div>

<script>

    function registerUser(){
    let user={
    username:username.value,
    email:email.value,
    password:password.value
    };

    localStorage.setItem("user",JSON.stringify(user));
    alert("Registered!");
    window.location="login.html";

    return false;
    }

</script>

</body>
</html>

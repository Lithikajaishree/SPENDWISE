<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Expense</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

</head>

<body class="expense-bg">

<nav class="navbar navbar-dark bg-dark px-4 d-flex justify-content-between">

    <span class="navbar-brand">SpendWise</span>

    <a href="expenses.html" class="btn btn-light btn-sm">Back</a>

</nav>

<div class="container" style="margin-top:90px;">

    <div class="card p-4 mx-auto" style="max-width:400px;">

        <h5 class="text-center mb-3">Edit Expense</h5>

        <form>

            <input type="text" class="form-control mb-2" value="Food">

            <input type="number" class="form-control mb-2" value="20">

            <select class="form-control mb-2">
                <option>Food</option>
                <option>Transport</option>
                <option>Shopping</option>
                <option>Bills</option>
            </select>

            <input type="date" class="form-control mb-2">

            <button class="btn btn-primary w-100">Update</button>

        </form>

    </div>

</div>

</body>
</html>

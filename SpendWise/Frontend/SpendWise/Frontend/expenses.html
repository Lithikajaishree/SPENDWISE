<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Expenses - SpendWise</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{

        margin:0;
        font-family:Arial;

        background:
        linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)),
        url("back.png");

        background-size:cover;
        background-position:center;
        background-repeat:no-repeat;

        min-height:100vh;

        }

        /* table container */

        .expense-container{

        background:white;

        margin:60px auto;

        padding:30px;

        border-radius:15px;

        width:80%;

        box-shadow:0px 8px 25px rgba(0,0,0,0.3);

        }

    </style>

</head>

<body>

<div class="expense-container">

    <h3 class="mb-4">📋 Expense List</h3>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">

        <tr>
            <th>Expense</th>
            <th>Amount</th>
            <th>Category</th>
            <th>Date</th>
            <th>Actions</th>
        </tr>

        </thead>

        <tbody>

        <tr>
            <td>Food</td>
            <td>$20</td>
            <td>Food</td>
            <td>12 Mar</td>

            <td>

                <a href="edit-expense.html" class="btn btn-warning btn-sm">
                    Edit
                </a>

                <button class="btn btn-danger btn-sm" onclick="deleteExpense()">
                    Delete
                </button>
                <script>

                    function deleteExpense(){

                    if(confirm("Are you sure you want to delete this expense?")){
                    alert("Expense deleted (demo)");
                    }

                    }

                </script>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title> Login</title>



    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

</head>

<body class="login-bg">

<div class="form-box text-center">

    <h2>Login</h2>
    <img src="images/logo.png" width="70" height="80">

    <form onsubmit="return loginUser()">

        <input id="username" class="form-control mb-3" placeholder="Username" required>
        <input id="password" type="password" class="form-control mb-3" placeholder="Password" required>

        <button class="btn btn-primary w-100">Login</button>

    </form>

    <a href="register.html">Create Account</a>

</div>

<script>

    if(localStorage.getItem("user")){
    window.location="dashboard.html";
    }

    function loginUser(){
    let u=username.value;
    let p=password.value;
    let user=JSON.parse(localStorage.getItem("user"));

    if(user && user.username===u && user.password===p){
    window.location="dashboard.html";
    }else{
    alert("Invalid login");
    }
    return false;
    }

</script>

</body>
</html>

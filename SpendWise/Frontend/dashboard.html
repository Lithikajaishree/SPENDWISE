<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SpendWise Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="dashboard-bg">



<nav class="navbar navbar-dark bg-dark px-4 d-flex justify-content-between">

    <div class="d-flex align-items-center">
        <img src="images/logo.png" width="35">
        <span class="navbar-brand ms-2 mb-0">SpendWise Dashboard</span>
    </div>

    <a href="login.html" class="btn btn-light btn-sm">Logout</a>

</nav>



<div class="container" style="margin-top:90px;">



    <div class="row text-center justify-content-center g-4">

        <div class="col-md-3">
            <div class="card p-4">
                <h6>Total Balance</h6>
                <h3 class="text-success">$1200</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-4">
                <h6>Total Expenses</h6>
                <h3 class="text-danger">$450</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-4">
                <h6>Savings</h6>
                <h3 class="text-primary">$750</h3>
            </div>
        </div>

    </div>



    <div class="text-center mt-4">
        <a href="add-expense.html" class="btn btn-primary me-2 px-4">Add Expense</a>
        <a href="expenses.html" class="btn btn-success px-4">View Expenses</a>
    </div>



    <div class="card p-4 mt-4 mx-auto" style="max-width:350px;">
        <h6 class="text-center">Set Monthly Budget</h6>
        <input type="number" class="form-control mb-2">
        <button class="btn btn-primary w-100">Save Budget</button>
    </div>



    <div style="width:280px; margin:40px auto; background:white; padding:20px; border-radius:15px;">
        <h6 class="text-center">Expense Distribution</h6>
        <canvas id="expenseChart" style="width:220px; height:220px;"></canvas>
    </div>

</div>

<script>

    const ctx = document.getElementById('expenseChart');

    new Chart(ctx,{
        type:'pie',
        data:{
            labels:['Food','Transport','Shopping','Bills','Entertainment'],
            datasets:[{
                data:[200,100,80,40,30],
                backgroundColor:[
                    '#ff6384',
                    '#36a2eb',
                    '#ffcd56',
                    '#4bc0c0',
                    '#9966ff'
                ]
            }]
        }
    });

</script>

</body>
</html>

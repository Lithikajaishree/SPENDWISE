<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SpendWise Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
        margin:0;
        font-family:Arial;

        background:
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
        url("dash.png");

        background-size:cover;
        background-position:center;
        background-repeat:no-repeat;

        min-height:100vh;
        }

        /* navbar */

        .navbar{
        background:rgba(0,0,0,0.6);
        }

        .navbar-brand{
        font-weight:700;
        color:white;
        }

        /* dashboard cards */

        .card{
        border:none;
        border-radius:15px;
        box-shadow:0px 6px 20px rgba(0,0,0,0.2);
        }

        .card h3{
        font-weight:700;
        }

        /* buttons */

        .btn-main{
        background:linear-gradient(90deg,#00c6ff,#0072ff);
        border:none;
        border-radius:25px;
        font-weight:600;
        padding:10px 20px;
        }

        .btn-main:hover{
        background:linear-gradient(90deg,#0072ff,#00c6ff);
        }

    </style>

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-dark px-4">
    <span class="navbar-brand">💰 SpendWise Dashboard</span>
    <a href="login.html" class="btn btn-light btn-sm">Logout</a>
</nav>


<div class="container mt-5">

    <div class="row text-center">

        <!-- Balance -->

        <div class="col-md-4 mb-4">
            <div class="card p-4">
                <h5>Total Balance</h5>
                <h3 class="text-success">$0</h3>
            </div>
        </div>

        <!-- Expenses -->

        <div class="col-md-4 mb-4">
            <div class="card p-4">
                <h5>Total Expenses</h5>
                <h3 class="text-danger">$0</h3>
            </div>
        </div>

        <!-- Savings -->

        <div class="col-md-4 mb-4">
            <div class="card p-4">
                <h5>Savings</h5>
                <h3 class="text-primary">$0</h3>
            </div>
        </div>

    </div>

    <!-- Buttons -->

    <div class="text-center mt-4">

        <a href="add-expense.html" class="btn btn-main me-3">
            ➕ Add Expense
        </a>

        <a href="expenses.html" class="btn btn-main">
            📋 View Expenses
        </a>

    </div>

</div>

</body>
</html>

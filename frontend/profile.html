<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>

    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="dashboard-bg">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">
        <img src="images/logo.png" width="40" class="me-2">
        My Profile
    </span>

    <a href="dashboard.html" class="btn btn-light btn-sm">Dashboard</a>
</nav>

<div class="container mt-5 text-center">

    <h2 class="text-white mb-4">My Profile</h2>

    <div class="card p-4">

        <p><strong>Email:</strong> <span id="userEmail"></span></p>
        <p><strong>Username:</strong> <span id="username"></span></p>
        <p><strong>Total Expenses:</strong> $ <span id="totalExpense"></span></p>
        <p><strong>Budget:</strong> $ <span id="budget"></span></p>
        <p><strong>Number of Transactions:</strong> <span id="count"></span></p>

        <button onclick="logout()" class="btn btn-danger mt-3">Logout</button>

    </div>

</div>

<script>
    // Get user email
    const email = localStorage.getItem("userEmail");

    // Simple username from email
    const username = email ? email.split("@")[0] : "Guest";

    // Get expenses
    const expenses = JSON.parse(localStorage.getItem("expenses")) || [];

    // Calculate total
    let total = 0;
    expenses.forEach(e => total += Number(e.amount));

    // Get budget
    const budget = localStorage.getItem("budget") || 0;

    // Set values
    document.getElementById("userEmail").innerText = email || "Not logged in";
    document.getElementById("username").innerText = username;
    document.getElementById("totalExpense").innerText = total;
    document.getElementById("budget").innerText = budget;
    document.getElementById("count").innerText = expenses.length;

    // Logout
    function logout() {
        localStorage.removeItem("userEmail");
        window.location.href = "login.html";
    }
</script>

</body>
</html>

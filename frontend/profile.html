<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>

    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="dashboard-bg">

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">
        <img src="images/logo.png" width="40" class="me-2">
        My Profile
    </span>

    <a href="dashboard.html" class="btn btn-light btn-sm">Dashboard</a>
</nav>

<div class="container mt-5 text-center">
    <h2 class="text-white mb-4">My Profile</h2>

    <div class="card p-4">
        <p><strong>Email:</strong> <span id="userEmail"></span></p>
        <p><strong>Username:</strong> <span id="username"></span></p>
        <p><strong>Total Expenses:</strong> $ <span id="totalExpense">0.00</span></p>
        <p><strong>Budget:</strong> $ <span id="budget">0.00</span></p>
        <p><strong>Number of Transactions:</strong> <span id="count">0</span></p>

        <button id="logoutBtn" class="btn btn-danger mt-3">Logout</button>
    </div>
</div>

<script src="js/profile.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Expenses</title>

    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="expense-bg">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">Expenses</span>
    <a href="dashboard.html" class="btn btn-light btn-sm">Dashboard</a>
</nav>

<div class="container mt-4">

    <h2 class="text-white">Expenses</h2>

    <div class="card p-3">

        <div class="row mb-3">

            <div class="col">
                <input type="date" id="filterDate" class="form-control">
            </div>

            <div class="col">
                <select id="filterCategory" class="form-control">
                    <option value="">All</option>
                    <option>Food</option>
                    <option>Transport</option>
                    <option>Shopping</option>
                </select>
            </div>

            <div class="col">
                <button onclick="filterExpenses()" class="btn btn-primary">Filter</button>
            </div>

        </div>

        <h4>Total: <span id="total"></span></h4>

        <ul id="expenseList" class="list-group"></ul>

    </div>

</div>

<script src="js/expenses.js"></script>
</body>
</html>

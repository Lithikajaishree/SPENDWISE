<!DOCTYPE html>
<html>
<head>
    <title>Add Expense</title>

    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="expense-bg">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">Add Expense</span>
    <a href="dashboard.html" class="btn btn-light btn-sm">Dashboard</a>
</nav>

<div class="container mt-5">
    <div class="card p-4">

        <h2>Add Expense</h2>

        <form id="expenseForm">

            <input type="number" class="form-control mb-3" id="amount" placeholder="Amount" required>

            <input type="text" class="form-control mb-3" id="description" placeholder="Description" required>

            <select class="form-control mb-3" id="category" required>
                <option value="">Select Category</option>
                <option>Food</option>
                <option>Transport</option>
                <option>Shopping</option>
                <option>Bills</option>
                <option>Entertainment</option>
            </select>

            <input type="date" class="form-control mb-3" id="date" required>

            <button class="btn btn-primary w-100">Add Expense</button>

        </form>

        <p id="error" class="text-danger mt-2"></p>
        <p id="success" class="text-success mt-2"></p>

    </div>
</div>

<script src="js/expenses.js"></script>
</body>
</html>

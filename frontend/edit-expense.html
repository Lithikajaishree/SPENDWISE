<!DOCTYPE html>
<html>
<head>
    <title>Edit Expense</title>

    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="expense-bg">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">Edit Expense</span>
    <a href="expenses.html" class="btn btn-light btn-sm">Back</a>
</nav>

<div class="container mt-5">
    <div class="card p-4">

        <h2>Edit Expense</h2>

        <input type="number" class="form-control mb-3" id="amount" placeholder="Amount">

        <input type="text" class="form-control mb-3" id="description" placeholder="Description">

        <select class="form-control mb-3" id="category">
            <option>Food</option>
            <option>Transport</option>
            <option>Shopping</option>
            <option>Bills</option>
            <option>Entertainment</option>
        </select>

        <input type="date" class="form-control mb-3" id="date">

        <button onclick="updateExpense()" class="btn btn-primary w-100">Update Expense</button>

    </div>
</div>

<script>
    const expenses = JSON.parse(localStorage.getItem("expenses")) || [];
    const index = localStorage.getItem("editIndex");

    if (index !== null) {
        const exp = expenses[index];

        document.getElementById("amount").value = exp.amount;
        document.getElementById("description").value = exp.description;
        document.getElementById("category").value = exp.category;
        document.getElementById("date").value = exp.date;
    }

    function updateExpense() {

        const amount = Number(document.getElementById("amount").value);
        const description = document.getElementById("description").value.trim();
        const category = document.getElementById("category").value;
        const date = document.getElementById("date").value;

        if (amount <= 0) {
            alert("Amount must be greater than 0");
            return;
        }

        if (!description) {
            alert("Description is required");
            return;
        }

        if (!date) {
            alert("Invalid date");
            return;
        }

        expenses[index] = { amount, description, category, date };

        localStorage.setItem("expenses", JSON.stringify(expenses));

        alert("Expense updated successfully!");

        window.location.href = "expenses.html";
    }
</script>

</body>
</html>

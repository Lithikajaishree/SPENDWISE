<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="login-bg auth-page">

<div class="container-center">
    <div class="form-box">

        <!-- LOGO -->
        <div class="text-center mb-3">
            <img src="images/logo.png" width="80">
        </div>

        <h2 class="text-center">Login</h2>

        <form id="loginForm">

            <input type="email" class="form-control mb-3" id="email" placeholder="Enter Email ID" required>

            <input type="password" class="form-control mb-3" id="password" placeholder="Enter Password" required>

            <button class="btn btn-primary w-100">Login</button>

        </form>

        <p id="error" class="text-danger mt-2"></p>

        <p class="text-center mt-3">
            <a href="register.html">Create Account</a>
        </p>

    </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
